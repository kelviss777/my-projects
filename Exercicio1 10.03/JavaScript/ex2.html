<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="ex2.js"></script>
    <style>
        #oculta {
            display: none;
        }
    </style>
</head>
<body>
    <form name="contato" id="contato" onsubmit="return validar()">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>
        <label for="assunto">Assunto:</label>
        <select name="assunto" id="assunto" onchange="return verificarOpcao()">
            <option value="" selected>Selecione uma Opção</option>
            <option value="duvida">Dúvida</option>
            <option value="sugestao">Sugestão</option>
            <option value="reclamacao">Reclamação</option>
            <option value="outro">Outro</option>
        </select>
        <br>
        <div id="oculta">
            <label for="qual">Qual?</label>
            <input type="text" id="qual" name="qual">
        </div>
        <label for="mensagem">Mensagem:</label><br>
        <textarea name="mensagem" id="mensagem" cols="28" rows="10"></textarea><br><br>  
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
