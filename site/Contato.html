    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js" integrity="sha512-pHVGpX7F/27yZ0ISY+VVjyULApbDlD0/X0rgGbTqCE7WFW5MezNTWG/dnhtbBuICzsd0WQPgpE4REBLv+UqChw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        $(document).ready(function () {
            $('#cpf').mask('000.000.000-00');
            $('#cep').mask('00000-000');
            $('#telefone').mask('(00) 00000-0000');
        });
    </script>
    <script src="./js/cep.js"></script>
</head>

<body>
    <header class="flex-containe    r" id="topo">
        <img src="imagem/logo_ub.png" alt="logo universidade brasil azul com logo transparente">
    </header>
    <nav class="flex-container">
        <label for="bt_menu"><img src="./imagem/menu.png" alt="menu"></label>
        <input type="checkbox" name="bt_menu" id="bt_menu">

        <ul id="menu">

            <li><a href="Contato.html">Contato</a></li>
        </ul>


    </nav>
    <main class="flex-container" id="conteudo">

        <section>

            <h1>CONTATO</h1>
            <Form action="" method="post">
                <fieldset>
                    <legend>Dados Pessoais</legend>
                    <label for="nome" class="required">Nome:</label>
                    <input type="text" name="nome" id="nome" placeholder="Digite seu nome completo" required>
                    <label for="cpf" class="required">CPF</label>
                    <input type="text" name="cpf" id="cpf" placeholder="Digite seu CPF" required>
                    <label for="date" class="required">Data de nascimento</label>
                    <input type="date" name="data" id="data" required>
                    <label for="email" class="required">E-mail</label>
                    <input type="email" name="email" id="email" placeholder="Digite seu e-mail" required>
                    <label for="telefone">Telefone</label>
                    <input type="tel" name="telefone" id="telefone" placeholder="Digite seu telefone">
                </fieldset>

                <fieldset>
                    <legend>Endereço</legend>
                    <label for="cep" class="required">CEP</label>
                    <input type="text" name="cep" id="cep" placeholder="Digite seu CEP" required>
                    <label for="rua">Rua</label>
                    <input type="text" name="rua" id="rua" disabled>
                    <label for="numero" class="required">Numero</label>
                    <input type="number" name="numero" id="numero" required>
                    <label for="complemento">Complemento</label>
                    <input type="text" name="complemento" id="complemento">
                    <label for="bairro">Bairro</label>
                    <input type="text" name="bairro" id="bairro" required>
                    <label for="cidade">Cidade</label>
                    <input type="text" name="cidade" id="cidade" required>
                    <label for="estado">Estado</label>
                    <input type="text" name="estado" id="estado" required>
                </fieldset>

                <fieldset>
                    <legend>Mensagem</legend>
                    <label for="assunto" class="required">Assunto</label>
                    <input type="text" name="assunto" id="assunto" placeholder="Digite o assunto da mensagem" required>
                    <label for="mensagem" class="required">Mensangem</label>
                    <textarea name="mensangem" id="mensagem" placeholder="Digite sua mensagem agui..."
                        required></textarea>
                </fieldset>
                <button type="submit">Enviar</button>
            </form>

        </section>


    </main>
    <footer class="flex-container" id="rodape">
        <p>Todos os direitos reservados &copy; 2026</p>

    </footer>

</body>
